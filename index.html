<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERCSO'S PLAYGROUND</title>
    
    <!-- Google Fonts: Inter for the Grotesque Sans-Serif look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Tailwind Configuration matching your exact color palette and typography -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        black: '#000000',
                        cardBg: '#1C1C1E',          /* Very Dark Grey */
                        cardElevated: '#2C2C2E',    /* Elevated Surface */
                        textPrimary: '#FFFFFF',
                        textSecondary: '#8E8E93',   /* Cool Grey */
                        textTertiary: '#48484A',    /* Inactive */
                        accentRed: '#FF453A',       /* Warning/Live */
                        accentYellow: '#FFD60A',    /* Highlight/Fame */
                        accentPurple: '#BF5AF2',    /* Playback/Active */
                        accentDynamic: 'var(--accent-dynamic)' /* Dynamic JS Color */
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    letterSpacing: {
                        tighter: '-0.06em', /* Tight tracking for headers */
                        tight: '-0.03em',
                    },
                    borderRadius: {
                        'bento': '24px', /* Continuous curvature squircle */
                        'bento-inner': '16px',
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar to match the dark theme */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #2C2C2E;
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #48484A;
        }
        
        /* Hide element class for JS search filtering */
        .hidden-card {
            display: none !important;
        }
    </style>
</head>
<body class="bg-black text-textPrimary font-sans antialiased min-h-screen selection:bg-accentPurple selection:text-white">

    <!-- GLASSMORPHISM HEADER -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-black/60 border-b border-cardElevated/30 pb-4 pt-6 px-6 md:px-12">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-6">
            
            <!-- TITLE -->
            <div>
                <h1 class="text-4xl md:text-5xl font-black uppercase tracking-tighter leading-none flex flex-col gap-1">
                    <span>Ercso's</span>
                    <span id="playgroundText" class="transition-colors duration-500">Playground</span>
                </h1>
            </div>

            <!-- SEARCH BAR -->
            <div class="w-full md:w-1/3 relative group">
                <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-textSecondary group-focus-within:text-accentDynamic transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="SEARCH MODULES..." 
                    class="w-full bg-cardBg text-textPrimary placeholder-textSecondary rounded-full pl-12 pr-6 py-4 outline-none focus:ring-2 focus:ring-accentDynamic transition-all uppercase font-bold tracking-tight text-sm"
                >
            </div>

        </div>
    </header>

    <!-- MAIN BENTO GRID -->
    <main class="max-w-7xl mx-auto p-6 md:p-12">
        <div id="bentoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
            <!-- Cards are now injected here automatically by Javascript -->
        </div>
        
        <!-- Empty State (Shows when search finds nothing) -->
        <div id="emptyState" class="hidden text-center py-24">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 mx-auto text-textTertiary mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <h3 class="text-2xl font-black uppercase tracking-tighter text-textSecondary mb-2">NO MODULES FOUND</h3>
            <p class="text-textTertiary font-medium">Try adjusting your search criteria.</p>
        </div>

    </main>

    <!-- SEARCH LOGIC SCRIPT -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ==========================================
            // 1. CONFIGURATION: TAGS & CARDS
            // ==========================================
            
            // Define your premade tags and their colors here
            const TAGS = {
                "Creative": { bg: "#FFD60A", text: "#000000" }, // Yellow
                "Game":  { bg: "#FF453A", text: "#FFFFFF" }, // Red
                "Links":   { bg: "#BF5AF2", text: "#FFFFFF" }, // Purple
                "Default":  { bg: "#2C2C2E", text: "#FFFFFF" }  // Dark Grey fallback
            };

            // Add your new modules to this list!
            // Format: "link | tag | description | title | image_url"
            const MODULES_DATA = [
                "[https://itsstillerik.github.io/recipt-generator/] | Creative | Generates recipes from given data | Recipt generator | https://ibb.co/VcdryPjV",
                "[https://itsstillerik.github.io/Poker-Hand-Trainer/] | Game | Helps you train your poker-hand knowledge. | Poker-Hand Trainer | https://ibb.co/LXXH4N2n",
                "https://github.com/ItsStillErik | Active | Github | Ercsos github profile | https://ibb.co/7Jny3X6y"
            ];

            // ==========================================
            // 2. RENDER CARDS TO THE GRID
            // ==========================================
            const grid = document.getElementById('bentoGrid');
            
            MODULES_DATA.forEach(dataRow => {
                // Split the row by '|' and remove any extra spaces
                const [link, tagName, desc, title, imageUrl] = dataRow.split('|').map(item => item.trim());
                
                // Look up the tag colors (use 'Default' if you typed a tag that doesn't exist)
                const tag = TAGS[tagName] || TAGS["Default"];

                // Build the HTML for the card
                const cardHTML = `
                    <a href="${link}" class="bento-card group block bg-cardBg rounded-bento p-5 hover:bg-cardElevated transition-all duration-300 transform hover:-translate-y-1">
                        <!-- PREVIEW IMAGE / ICON AREA -->
                        <div class="aspect-video bg-black rounded-bento-inner mb-5 overflow-hidden relative flex items-center justify-center border border-cardElevated/50">
                            
                            <!-- Dynamically loaded preview image -->
                            <img src="${imageUrl}" alt="${title}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500">
                            
                            <!-- Live/Active Badge -->
                            <div class="card-badge absolute top-3 left-3 z-10 text-xs font-bold uppercase tracking-tight py-1 px-3 rounded-full flex items-center gap-2" style="background-color: ${tag.bg}; color: ${tag.text};">
                                <span class="w-2 h-2 rounded-full animate-pulse" style="background-color: ${tag.text};"></span> ${tagName}
                            </div>
                        </div>

                        <!-- CARD TEXT CONTENT -->
                        <div class="flex items-end justify-between gap-4">
                            <div class="flex-1">
                                <h2 class="card-title text-2xl font-black uppercase tracking-tighter leading-none mb-2 text-textPrimary">${title}</h2>
                                <p class="card-desc text-textSecondary text-lg font-medium leading-tight">${desc}</p>
                            </div>
                            
                            <!-- Action Arrow -->
                            <div class="bg-cardElevated text-textPrimary p-3 rounded-full group-hover:bg-accentDynamic group-hover:text-black transition-colors shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                    <polyline points="12 5 19 12 12 19"></polyline>
                                </svg>
                            </div>
                        </div>
                    </a>
                `;
                
                // Inject the generated card into the grid
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });

            // ==========================================
            // 3. UI LOGIC (Colors & Search)
            // ==========================================

            // --- Random Color Generator for Title ---
            const playgroundText = document.getElementById('playgroundText');
            // A curated array of high-saturation, OLED-friendly colors
            const vibrantColors = [
                '#FF453A', // Neon Red
                '#FFD60A', // Sunflower Yellow
                '#BF5AF2', // Vibrant Purple
                '#32D74B', // Neon Green
                '#64D2FF', // Cyan
                '#FF375F', // Hot Pink
                '#FF9F0A'  // Bright Orange
            ];
            // Pick a random color and apply it
            const randomColor = vibrantColors[Math.floor(Math.random() * vibrantColors.length)];
            playgroundText.style.color = randomColor;

            // Update the CSS variable so the search bar focus matches the title
            document.documentElement.style.setProperty('--accent-dynamic', randomColor);

            // --- Search Logic ---
            const searchInput = document.getElementById('searchInput');
            // Grab the cards AFTER they have been injected
            const cards = document.querySelectorAll('.bento-card');
            const emptyState = document.getElementById('emptyState');

            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase().trim();
                let visibleCount = 0;

                cards.forEach(card => {
                    // Grab the text from the title, description, and badge inside the card
                    const title = card.querySelector('.card-title') ? card.querySelector('.card-title').textContent.toLowerCase() : '';
                    const desc = card.querySelector('.card-desc') ? card.querySelector('.card-desc').textContent.toLowerCase() : '';
                    const badge = card.querySelector('.card-badge') ? card.querySelector('.card-badge').textContent.toLowerCase() : '';

                    // Check if search term matches title, description, or badge
                    if (title.includes(searchTerm) || desc.includes(searchTerm) || badge.includes(searchTerm)) {
                        card.classList.remove('hidden-card');
                        visibleCount++;
                    } else {
                        card.classList.add('hidden-card');
                    }
                });

                // Show/hide the empty state message based on visible cards
                if (visibleCount === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    emptyState.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
